<svg xmlns="http://www.w3.org/2000/svg" width="106" height="24" viewBox="0 0 106 24" role="img" aria-label="License: MIT">
  <title>License: MIT</title>
  <defs>
    <linearGradient id="license-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34a853"/>
      <stop offset="1" stop-color="#22863a"/>
    </linearGradient>
    <clipPath id="license-shape">
      <rect width="106" height="24" rx="5"/>
    </clipPath>
  </defs>
  <g clip-path="url(#license-shape)">
    <rect width="70" height="24" fill="#30363d"/>
    <rect x="70" width="36" height="24" fill="url(#license-fill)"/>
  </g>
  <g fill="#fff" font-family="Verdana,DejaVu Sans,sans-serif" font-size="11">
    <text x="35" y="16" text-anchor="middle">license</text>
    <text x="88" y="16" text-anchor="middle">MIT</text>
  </g>
</svg>
