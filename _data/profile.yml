short_bio: >-
  <p>
    I am currently pursuing a B.Eng. in Computer Science and Technology at the <a href="https://hc.buaa.edu.cn/xygk/gdlgxy.htm">School of Advanced Engineering</a>, <a href="https://ev.buaa.edu.cn/Schools___Colleges/Shen_Yuan_Honors_College.htm">Shen Yuan Honors College</a>, <a href="https://ev.buaa.edu.cn/">Beihang University</a>.
    Beginning in 2027, I will continue at Beihang for a Ph.D. in Computer Science, recommended for admission exempt from the entrance examination, under the supervision of Prof. <a href="https://wgrong.github.io/">Wenge Rong</a>.
  </p>
  <p>
    In my junior year and earlier, I worked on <strong>AI for Software Engineering (SE)</strong>, advised by Asst. Prof. <a href="https://liufang816.github.io/">Fang Liu</a> and Prof. <a href="https://scse.buaa.edu.cn/info/1078/2647.htm">Li Zhang</a>.
  </p>
  <p>
    I have also collaborated with Assoc. Prof. <a href="https://csjianyang.github.io/">Jian Yang</a> on <strong>Natural Language Processing (NLP)</strong>. My research now centers on <strong>LLM Foundation Models</strong>, spanning <u><i>Data Engineering</i>, <i>Pre-training</i>, <i>Mid-training</i>, and <i>Post-training</i> for Large Language Models</u>.
  </p>

