short_bio: >-
  <p>
    I am currently pursuing a Bachelor's degree in Computer Science and Technology, at <a href="https://hc.buaa.edu.cn/xygk/gdlgxy.htm">School of Advanced Engineering</a>, <a href="https://ev.buaa.edu.cn/Schools___Colleges/Shen_Yuan_Honors_College.htm">Shen Yuan Honors College</a>, <a href="https://ev.buaa.edu.cn/">Beihang University</a>.
  </p>
  <p>
    During my junior year and prior, I conducted research on <strong>AI for Software Engineering (SE)</strong> under the supervision of Asst. Prof. <a href="https://liufang816.github.io/">Fang Liu</a> and Prof. <a href="https://scse.buaa.edu.cn/info/1078/2647.htm">Li Zhang</a>.
  </p>
  <p>
    Currently, I am conducting my research under the guidance of Assoc. Prof. <a href="https://csjianyang.github.io/">Jian Yang</a> and Prof. <a href="https://xlliu-beihang.github.io/">Xianglong Liu</a>, focusing on <strong>Natural Language Processing (NLP)</strong> for my upcoming Ph.D. studies. My research centers on <strong>LLM Foundation Models</strong>, including
    <u> <i> AI Infra </i>, <i> Data Engineering </i>, <i> Pre-training </i>, and <i> Post-training </i> techniques for Large Language Models </u>.
  </p>

