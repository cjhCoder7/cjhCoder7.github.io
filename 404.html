---
layout: prompt
title: 404 - Page Not Found
---
<div class="error-page text-center">
    <div class="error-code">404</div>
    <p class="lead mb-3">This page could not be found.</p>

    <pre class="error-shell mb-4" aria-hidden="true"><span class="sh-prompt">$</span> cat <span class="sh-path">page-not-found</span>
cat: <span class="sh-path">page-not-found</span>: No such file or directory<span class="pixel-caret"></span></pre>

    <div>
        <a class="btn btn-primary px-4" href="{{ '/' | relative_url }}">
            &larr; Back to home
        </a>
    </div>
</div>

<script>
    // Fill in the path the visitor actually tried, so the shell line reads true.
    (function () {
        var path = (window.location && window.location.pathname) || '/';
        if (path.length > 1) path = path.replace(/\/+$/, ''); // tidy trailing slash
        var nodes = document.querySelectorAll('.error-shell .sh-path');
        for (var i = 0; i < nodes.length; i++) {
            nodes[i].textContent = path;
        }
    })();
</script>
